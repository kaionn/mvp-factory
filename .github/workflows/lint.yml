name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          set -euo pipefail
          # ubuntu-latest には shellcheck がプリインストールされている
          shellcheck --version
          # scripts/ 配下の全 .sh ファイルを検証
          # SC2086 (word splitting) は GitHub Actions の慣習として許容
          shellcheck --severity=warning --exclude=SC2086 scripts/*.sh

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          set -euo pipefail
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -version

      - name: Run actionlint
        run: |
          set -euo pipefail
          # actionlint runs bundled shellcheck on workflow run blocks
          ./actionlint -color
