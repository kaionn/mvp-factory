name: Build MVP

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'pain-collector の Issue 番号'
        required: true
        type: string
      source_repo:
        description: 'pain-collector のリポジトリ (owner/repo)'
        required: true
        type: string
      spec_content:
        description: 'Spec ファイルの内容 (base64)'
        required: true
        type: string
      deep_dive_content:
        description: 'Deep Dive の内容 (base64、空の場合あり)'
        required: false
        type: string
        default: ''
      product_name:
        description: 'プロダクト名 (ケバブケース)'
        required: true
        type: string

env:
  PRODUCT_REPO: kaionn/${{ github.event.inputs.product_name }}

jobs:
  create-repo:
    if: github.actor == 'kaionn'
    runs-on: ubuntu-latest
    outputs:
      repo_created: ${{ steps.create.outputs.created }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate caller
        run: |
          SOURCE="${{ github.event.inputs.source_repo }}"
          if [[ "$SOURCE" != kaionn/* ]]; then
            echo "::error::Unauthorized source repo: $SOURCE"
            exit 1
          fi

      - name: Validate spec against schema
        id: validate-spec
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          SOURCE="${{ github.event.inputs.source_repo }}"
          SPEC_B64="${{ github.event.inputs.spec_content }}"

          echo "$SPEC_B64" | base64 -d > /tmp/spec.md

          # pain-collector から JSON Schema を取得（main branch から）
          SCHEMA_URL="https://raw.githubusercontent.com/${SOURCE}/main/specs/schema.json"
          if ! curl -fsSL "$SCHEMA_URL" -o /tmp/schema.json; then
            echo "::warning::Schema を取得できませんでした ($SCHEMA_URL)。検証をスキップして続行します。"
            exit 0
          fi

          pip install --quiet pyyaml jsonschema

          python3 <<'PY'
          import json
          import re
          import sys

          import yaml
          from jsonschema import Draft7Validator

          with open('/tmp/spec.md', encoding='utf-8') as f:
              content = f.read()

          fm_match = re.match(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
          if not fm_match:
              print('::warning::Front Matter が存在しない legacy Spec です。検証をスキップします。')
              sys.exit(0)

          try:
              front_matter = yaml.safe_load(fm_match.group(1))
          except yaml.YAMLError as exc:
              print(f'::error::Front Matter の YAML パースに失敗: {exc}')
              sys.exit(1)

          if not isinstance(front_matter, dict):
              print('::error::Front Matter がオブジェクト形式ではありません')
              sys.exit(1)

          with open('/tmp/schema.json', encoding='utf-8') as f:
              schema = json.load(f)

          validator = Draft7Validator(schema)
          errors = sorted(validator.iter_errors(front_matter), key=lambda e: list(e.absolute_path))

          if errors:
              for err in errors:
                  path = '.'.join(str(p) for p in err.absolute_path) or '<root>'
                  print(f'::error::Spec validation failure at {path}: {err.message}')
              sys.exit(1)

          print('✅ Spec validation passed')
          PY

      - name: Notify spec validation failure
        if: failure() && steps.validate-spec.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ISSUE="${{ github.event.inputs.issue_number }}"
          SOURCE="${{ github.event.inputs.source_repo }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh issue edit "$ISSUE" --repo "$SOURCE" --add-label "spec-invalid" 2>/dev/null || true
          gh issue comment "$ISSUE" --repo "$SOURCE" --body "❌ Spec が schema 検証に失敗したため build を中止したのだ。

          - Schema 仕様: https://github.com/$SOURCE/blob/main/specs/SCHEMA.md
          - 失敗ログ: $RUN_URL

          \`/spec --force\` で Spec を再生成してから \`/approve\` を再実行してほしいのだ。"

      - name: Create product repository from template
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if gh repo view "$PRODUCT_REPO" &>/dev/null; then
            echo "Repository already exists"
            echo "created=false" >> $GITHUB_OUTPUT
          else
            gh repo create "$PRODUCT_REPO" \
              --template kaionn/mvp-template \
              --public \
              --clone=false
            echo "created=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for template generation
        run: |
          # テンプレートからのリポジトリ生成は非同期のため、コンテンツが反映されるまで待機
          for i in $(seq 1 12); do
            FILE_COUNT=$(gh api "repos/$PRODUCT_REPO/contents/" --jq 'length' 2>/dev/null || echo "0")
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ Template content ready ($FILE_COUNT files)"
              break
            fi
            echo "Waiting for template generation... (attempt $i/12)"
            sleep 5
          done
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Clone product repository
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh repo clone "$PRODUCT_REPO" product-repo

      - name: Place spec and deep dive files
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cd product-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ env.PRODUCT_REPO }}.git"
          mkdir -p docs

          echo "${{ github.event.inputs.spec_content }}" | base64 -d > docs/spec.md

          DEEP_DIVE="${{ github.event.inputs.deep_dive_content }}"
          if [ -n "$DEEP_DIVE" ]; then
            echo "$DEEP_DIVE" | base64 -d > docs/deep-dive.md
          fi

          cat > docs/origin.md << ORIGIN
          # Origin
          - pain-collector Issue: ${{ github.event.inputs.source_repo }}#${{ github.event.inputs.issue_number }}
          - Generated by: kaionn/mvp-factory
          - Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ORIGIN

          git add .
          git commit -m "docs: Spec と Deep Dive を配置"
          git push

      - name: Upload product-repo as artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-repo
          path: product-repo/

  build-with-claude:
    needs: create-repo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clone product repository
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh repo clone "$PRODUCT_REPO" product-repo
          cd product-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ env.PRODUCT_REPO }}.git"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code with spec
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          cd product-repo

          SPEC_PATH="docs/spec.md"
          PROMPT=$(cat ${{ github.workspace }}/templates/claude-prompt.md | sed "s|{{SPEC_PATH}}|$SPEC_PATH|g")

          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --output-format text \
            --max-turns 100 \
            > ../build.log 2>&1 || true

          echo "--- Build Log (last 50 lines) ---"
          tail -50 ../build.log

      - name: Push changes and create PR
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cd product-repo

          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="feat/initial-mvp"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "feat: MVP 初期実装（Claude Code 自動生成）"
            git push -u origin "$BRANCH"

            PR_URL=$(gh pr create \
              --title "feat: MVP 初期実装" \
              --body "$(cat <<'PR_BODY'
          ## 概要

          pain-collector Issue #${{ github.event.inputs.issue_number }} から自動生成された MVP の初期実装。

          ## 生成元
          - Spec: docs/spec.md
          - Deep Dive: docs/deep-dive.md（存在する場合）
          - pain-collector: ${{ github.event.inputs.source_repo }}#${{ github.event.inputs.issue_number }}

          ## 生成方法
          - Claude Code + compound-engineering plugin
          - ワークフロー: kaionn/mvp-factory build.yml

          ---
          自動生成 by mvp-factory
          PR_BODY
            )" \
              --head "$BRANCH" \
              --base main)

            echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          else
            echo "No changes generated"
            echo "PR_URL=" >> $GITHUB_ENV
          fi

      - name: Report result to pain-collector
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ISSUE="${{ github.event.inputs.issue_number }}"
          SOURCE="${{ github.event.inputs.source_repo }}"
          PRODUCT="${{ env.PRODUCT_REPO }}"

          if [ -n "$PR_URL" ]; then
            COMMENT="## MVP 自動生成完了

          - リポジトリ: [$PRODUCT](https://github.com/$PRODUCT)
          - PR: $PR_URL
          - ステータス: PR レビュー待ち

          次のステップ:
          1. PR をレビューしてマージ
          2. デプロイ設定（Vercel 等）
          3. LP でウェイトリスト収集"
          else
            COMMENT="## MVP 自動生成で変更なし

          Claude Code の実行は完了しましたが、コード変更が生成されませんでした。
          ビルドログを確認してください。

          リポジトリ: [$PRODUCT](https://github.com/$PRODUCT)"
          fi

          gh issue comment "$ISSUE" --repo "$SOURCE" --body "$COMMENT"

          if [ -n "$PR_URL" ]; then
            gh issue edit "$ISSUE" --repo "$SOURCE" \
              --remove-label "building" --add-label "pr-created" 2>/dev/null || true
          fi
